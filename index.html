<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Webpage Example</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #f4f4f4;
        }

        #content{
            font-size: 24px;
            margin-bottom: 20px;
            color: #333;
        }

        button{
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<h1>Dynamic Webpage with JavaScript</h1>

<div id="content">
    Click the button to change this text!
</div>

<button onclick="updateContent()">Change Content</button>

<script>
function updateContent(){

    const messages = [
        "Hello! The content has changed.",
        "JavaScript makes webpages interactive!",
        "DOM manipulation is powerful.",
        "You clicked the button again!",
        "Dynamic content loaded successfully!"
    ];

    let randomIndex = Math.floor(Math.random() * messages.length);

    document.getElementById("content").innerText = messages[randomIndex];
}
</script>

</body>
</html>
